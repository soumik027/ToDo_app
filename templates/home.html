```
    <div class="row">
        <h4>My Day</h4>
        <p class="text-muted" >{% now "j F Y"%}</p>

        <!-- Active Tasks -->
        <div class="col-md-7 col-lg-7" style="height: 450px; overflow: scroll;">
            
            <!-- Sample Task -->
            <div class="card m-1">
                <div class="card-body">
                    Sample Task 1
                    <span style="float: right;">
                        <button class="btn btn-success"><i class="fa fa-check"></i> Done</button>
                        <button class="btn btn-danger"><i class="fa fa-trash"></i></button>
                        <button class="btn btn-primary"><i class="fa fa-pencil"></i></button>
                    </span>
                </div>
            </div>

            <div class="card m-1">
                <div class="card-body">
                    Sample Task 2
                    <span style="float: right;">
                        <button class="btn btn-success"><i class="fa fa-check"></i> Done</button>
                        <button class="btn btn-danger"><i class="fa fa-trash"></i></button>
                        <button class="btn btn-primary"><i class="fa fa-pencil"></i></button>
                    </span>
                </div>
            </div>

        </div>

        <!-- Completed Tasks -->
        <div class="col-md-5 col-lg-5">
            <h5>Completed Tasks</h5>

            <div class="card m-1">
                <div class="card-body">
                    Completed Task 1
                    <span style="float: right;">
                        <button class="btn btn-danger"><i class="fa fa-times"></i> Undo</button>
                    </span>
                </div>
            </div>

        </div>
    </div>

    <!-- Form -->
    <div class="row">
        <div class="col-md-6 col-lg-6 p-0" style="position: absolute; bottom: 50px;">
            
            <form>
                <div class="form-group">
                    <span style="display: flex;">
                        <input type="text" class="form-control" placeholder="Add a task">
                        <button type="submit" class="btn btn-primary" style="width: 200px;">
                            <i class="fa fa-plus"></i> Add
                        </button>
                    </span>
                </div>
            </form>

        </div>
    </div>
</div>
