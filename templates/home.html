{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        .form-control {
            padding: 1.375rem .75rem !important;
        }
    </style>
</head>
<body>
    <div class="container">

        <h3 class="pt-5 text-center">ToDo App</h3>

        <div class="text-end pt-3">
            <button id="theme-toggle" class="btn btn-secondary">
                <i id="theme-icon" class="fa fa-moon-o"></i> Dark Mode
            </button>
        </div>

        <div class="row mt-3">
            <h4>My Day</h4>
            <p class="text-muted">{% now "j F Y" %}</p>

            <div class="col-md-7 col-lg-7" style="height: 450px; overflow: scroll;">
                {% for task in tasks %}
                <div class="card m-1">
                    <div class="card-body">
                        {{task.task}}
                        <span style="float: right;">
                            <a href="{% url 'mark_as_done' task.id %}" class="btn btn-success"><i class="fa fa-check"></i> Done</a>
                            <a href="#" class="btn btn-danger" onclick="confirmDelete({{ task.id }}, '{{ task.task|escapejs }}')">
                            <i class="fa fa-trash"></i></a>
                            <a href="{% url 'edit_task' task.id %}" class="btn btn-primary"><i class="fa fa-pencil"></i></a>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="col-md-5 col-lg-5">
                <h5>Completed Tasks</h5>
                {% for task in completed_tasks %}
                <div class="card m-1">
                    <div class="card-body">
                        {{ task.task }}
                        <span style="float: right;">
                            <a href="{% url 'mark_as_undo' task.pk %}" class="btn btn-danger"><i class="fa fa-times"></i> UnDo</a>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="row mt-4 mb-5">
            <div class="col-12 col-md-8 col-lg-6">
                <form action="{% url 'addTask' %}" method="POST">
                    {% csrf_token %}
                    <div class="input-group">
                        <input type="text" name="task" class="form-control" placeholder="Add a task" required>
                        <button type="submit" class="btn btn-primary" style="width: 120px;">
                            <i class="fa fa-plus"></i> Add
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>
        // --- Dark Mode Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement; // Gets the <html> tag

        // 1. Check if the user already chose a theme in the past
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        // Apply the saved theme on page load
        htmlElement.setAttribute('data-bs-theme', savedTheme);
        updateButton(savedTheme);

        // 2. Listen for clicks
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButton(newTheme);
        });

        // Helper function to change the icon and text
        function updateButton(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fa fa-sun-o'; // Change to sun icon
                themeToggleBtn.innerHTML = '<i class="fa fa-sun-o"></i> Light Mode';
            } else {
                themeIcon.className = 'fa fa-moon-o'; // Change to moon icon
                themeToggleBtn.innerHTML = '<i class="fa fa-moon-o"></i> Dark Mode';
            }
        }

        // --- Delete Confirmation Logic ---
        function confirmDelete(taskId, taskName) {
            Swal.fire({
                title: 'Are you sure?',
                text: "Delete \"" + taskName + "\" ?",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, delete it!'
            }).then((result) => {
                if (result.isConfirmed) {
                    // This lets Django generate the correct URL structure
                    let url = "{% url 'delete_task' 0 %}".replace('0', taskId);
                    window.location.href = url;
                }
            });
        }
    </script>
</body>
</html>
