<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <style>
        .form-control {
            padding: 1.375rem .75rem !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3 class='pt-5 pb-5 text-center'>Edit Your Task</h3>

        <div class="row">
            <div class="col-12 col-md-8 col-lg-6 mx-auto">
                
                <form action="{% url 'edit_task' get_task.id %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="input-group">
                        <input type="text" name="task" class="form-control" placeholder="Update your task..." value="{{ get_task.task }}" required>
                        
                        <button type="submit" class="btn btn-primary" style="width: 120px;">
                            <i class="fa fa-save"></i> Update
                        </button>
                        
                        <a href="{% url 'home' %}" class="btn btn-secondary d-flex align-items-center">
                            Cancel
                        </a>
                    </div>
                    
                </form>

            </div>
        </div>
    </div>
</body>
</html>
